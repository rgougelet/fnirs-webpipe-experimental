<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>fNIRS Web Pipeline</title>

  <link rel="stylesheet" href="vendor/uPlot.min.css?v=4.0">
  <link rel="stylesheet" href="utilities.css?v=4.0">
  <link rel="stylesheet" href="style.css?v=4.0">
</head>

<body class="bg-slate-100 text-slate-800">
  <div id="appShell" class="max-w-7xl mx-auto p-3 space-y-3 h-screen">

    <h1 class="text-2xl font-semibold">fNIRS Web Pipeline v4.0</h1>

    <div id="topRow" class="bg-white rounded border border-slate-200 p-2 grid grid-cols-5 gap-2 items-start">
      <div class="min-w-[220px] rounded border border-slate-200 bg-slate-50 p-2">
        <div class="text-[11px] uppercase tracking-wide text-slate-600 font-semibold mb-1">App</div>
        <div class="text-xl font-semibold text-slate-100 leading-tight">fNIRS Web Pipeline v4.0</div>
        <div class="text-xs text-slate-500 mt-1">Last updated: 2026-05-13 12:58 EDT</div>
      </div>

      <div class="min-w-[260px] rounded border border-slate-200 bg-slate-50 p-2">
        <div class="text-xs uppercase tracking-wide text-slate-600 font-semibold mb-2">Import</div>
        <input
          type="file"
          id="input"
          accept=".zip,.hdr,.wl1,.wl2,.evt,.mat,.snirf,.nirs"
          class="block w-full p-2 border rounded bg-white"
        >
      </div>

      <div id="protocolHost" class="hidden w-full col-span-3"></div>
    </div>

    <div id="leftPanel" class="space-y-3">
      <div id="versionBadge" class="bg-white rounded border border-slate-200 p-3">
        <div class="text-[11px] uppercase tracking-wide text-slate-600 font-semibold">fNIRS Web Pipeline</div>
        <div class="text-xl font-semibold text-slate-900 leading-tight">Version <span id="appVersion">0.3.32</span></div>
        <div id="appLastUpdated" class="text-sm font-semibold text-slate-600 mt-1">Last updated: 2026-05-13 12:58 EDT</div>
      </div>
      <div id="meta" class="bg-white rounded p-3 text-sm"></div>
      <div id="controls" class="hidden bg-white rounded p-3"></div>
    </div>

    <div id="leftSplitter" role="separator" aria-orientation="vertical" aria-label="Resize left panel"></div>

    <div id="plotArea">
      <div id="stageSummaryHost"></div>
      <div id="plotGrid" class="bg-white rounded p-4 grid grid-cols-2 gap-4">
        <div id="plot" class="plot-chart-host"></div>
      </div>
      <div id="plotScrollerHost"></div>
    </div>

  </div>

  <script src="vendor/jszip.js?v=4.0"></script>
  <script src="vendor/uPlot.iife.js?v=4.0"></script>
  <script src="mat4js.read.min.js?v=4.0"></script>
  <script src="filter.js?v=4.0"></script>
  <script src="plot.js?v=4.0"></script>
  <script src="protocol.js?v=4.0"></script>
  <script src="vendor/jsfive.hdf5.js?v=4.0"></script>
  <script src="snirf.js?v=4.0"></script>
  <script src="app.js?v=4.0"></script>

</body>
</html>
